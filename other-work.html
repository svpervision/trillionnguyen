<style>
  :root {
    --bg: #f5f2eb; --max-w: 1140px;
    --bg2: #edeae0; --bg3: #e4e0d4;
    --cream: #1a1814; --cream2: #3d3a32; --cream3: #585450;
    --accent: #a84d1a; --accent2: #c4622d;
    --border: rgba(26,24,20,0.09); --border2: rgba(26,24,20,0.16);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--cream); font-family: "Barlow", sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }
  .cursor { width: 24px; height: 24px; border: 1.5px solid var(--accent); border-radius: 50%; background: transparent; position: fixed; top: -12px; left: -12px; pointer-events: none; z-index: 9999; will-change: transform; }
  body::before { content: ""; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E"); opacity: 0.015; pointer-events: none; z-index: 100; }

  /* NAV */
  .nav-mobile-menu { display: none; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; justify-content: center; align-items: center; padding: 20px max(48px, calc((100vw - var(--max-w)) / 2)); pointer-events: none; }
  .nav-pill { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 100%; padding: 8px 0; border-radius: 100px; border: 1px solid transparent; background: transparent; pointer-events: all; transition: max-width 0.6s cubic-bezier(0.4,0,0.2,1), padding 0.6s cubic-bezier(0.4,0,0.2,1), background 0.5s ease, border-color 0.5s ease; }
  nav.scrolled .nav-pill { max-width: 580px; justify-content: space-between; align-items: center; padding: 0 16px 0 20px; height: 48px; background: rgba(245,242,235,0.95); border-color: var(--border2); backdrop-filter: blur(20px); }
  .nav-right { display: flex; align-items: center; gap: 20px; height: 100%; }
  .nav-logo { display: flex; align-items: center; height: 26px; text-decoration: none; opacity: 0.85; transition: opacity 0.2s; flex-shrink: 0; }
  .nav-logo:hover { opacity: 1; }
  .nav-logo img { height: 22px; width: auto; filter: none; }
  .nav-links { display: flex; gap: 24px; list-style: none; align-items: center; height: 100%; }
  .nav-links li { display: flex; align-items: center; height: 100%; }
  .nav-links a { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cream3); text-decoration: none; transition: color 0.2s; white-space: nowrap; }
  .nav-links a:hover { color: var(--cream); }
  .nav-cta { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(168,77,26,0.4); padding: 7px 16px; border-radius: 100px; transition: background 0.2s, color 0.2s; text-decoration: none; flex-shrink: 0; }
  .nav-cta:hover { background: var(--accent); color: var(--bg); }

  /* PAGE HEADER */
  .page-header {
    padding: 130px max(48px, calc((100vw - var(--max-w)) / 2)) 48px;
    border-bottom: 1px solid var(--border);
  }
  .page-eyebrow { font-family: "DM Mono", monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; display: block; }
  .page-title { font-family: "Barlow Condensed", sans-serif; font-size: clamp(52px, 7vw, 88px); font-weight: 700; line-height: 0.9; letter-spacing: 0.02em; text-transform: uppercase; color: var(--cream); }

  /* MASONRY GRID */
  .masonry-wrap {
    padding: 48px max(48px, calc((100vw - var(--max-w)) / 2));
  }

  .masonry {
    columns: 3;
    column-gap: 12px;
  }

  .masonry-item {
    break-inside: avoid;
    margin-bottom: 12px;
    overflow: hidden;
    cursor: none;
  }

  .masonry-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.3s ease;
  }

  .masonry-item:hover img { opacity: 0.85; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(245,242,235,0.95);
    backdrop-filter: blur(12px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
    cursor: none;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .lightbox-close {
    position: fixed;
    top: 28px; right: 28px;
    font-family: "DM Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream3);
    background: none;
    border: 1px solid var(--border2);
    padding: 7px 16px;
    border-radius: 100px;
    cursor: none;
    transition: color 0.2s, border-color 0.2s;
  }

  .lightbox-close:hover { color: var(--accent); border-color: var(--accent); }

  /* FOOTER */
  footer { border-top: 1px solid var(--border); padding: 48px max(48px, calc((100vw - var(--max-w)) / 2)); display: flex; justify-content: space-between; align-items: center; }
  .footer-left { font-family: "Barlow Condensed", sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.04em; color: var(--cream2); }
  .footer-links { display: flex; gap: 32px; }
  .footer-links a { font-family: "DM Mono", monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cream3); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--accent); }
  .footer-copy { font-family: "DM Mono", monospace; font-size: 9px; color: var(--cream3); }

  /* SKIP LINK */
  .skip-link { position: fixed; top: -100px; left: 24px; z-index: 9999; background: var(--accent); color: var(--bg); font-family: "DM Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 20px; border-radius: 100px; text-decoration: none; transition: top 0.2s; }
  .skip-link:focus { top: 24px; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 2px; }

  @media (prefers-reduced-motion: reduce) {
    .cursor { display: none; }
    body { cursor: auto; }
  }

  @media (max-width: 900px) {
    .masonry { columns: 2; }
  }

  @media (max-width: 640px) {
    nav { padding: 16px 20px; }
    nav.scrolled .nav-pill { max-width: calc(100vw - 40px); padding: 0 12px 0 16px; height: 44px; }
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 9px; letter-spacing: 0.1em; }
    .nav-cta { padding: 5px 10px; font-size: 9px; }
    .masonry { columns: 2; column-gap: 6px; }
    .masonry-item { margin-bottom: 6px; }
    .masonry-wrap { padding: 32px 16px; }
    .page-header { padding: 110px 24px 40px; }
    footer { flex-direction: column; gap: 20px; text-align: center; padding: 36px 24px; }
    .footer-links { flex-wrap: wrap; justify-content: center; gap: 14px; }
    .lightbox { padding: 20px; }
  }
</style>
</head>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">Close ✕</button>
  <img id="lightbox-img" src="" alt="Enlarged view">
</div>

<script>
  // Cursor
  const cursor = document.getElementById("cursor");
  document.addEventListener("mousemove", e => {
    cursor.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
  });
  document.addEventListener("mouseleave", () => cursor.style.opacity = "0");
  document.addEventListener("mouseenter", () => cursor.style.opacity = "1");

  // Nav pill
  const nav = document.getElementById("nav");
  window.addEventListener("scroll", () => {
    nav.classList.toggle("scrolled", window.scrollY > 80);
  });

  // Lightbox
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.body.style.overflow = "";
    document.getElementById("lightbox-img").src = "";
  }

  // Close on backdrop click
  document.getElementById("lightbox").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  // Close on Escape
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeLightbox();
  });
</script>
